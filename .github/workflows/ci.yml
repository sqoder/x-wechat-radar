name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps
        run: pip install pyyaml

      - name: Shell syntax check
        run: |
          bash -n scripts/doctor.sh
          bash -n scripts/up.sh
          bash -n scripts/up-stable.sh
          bash -n scripts/up-groups.sh
          bash -n scripts/x-latest.sh
          bash -n scripts/feishu-bot.sh
          bash -n scripts/install_feishu_launchd.sh
          bash -n scripts/uninstall_feishu_launchd.sh

      - name: Python syntax check
        run: |
          python -m py_compile overrides/trendradar/crawler/rss/fetcher.py
          python -m py_compile overrides/trendradar/crawler/rss/parser.py
          python -m py_compile overrides/trendradar/ai/translator.py
          python -m py_compile overrides/trendradar/notification/renderer.py
          python -m py_compile overrides/trendradar/notification/senders.py
          python -m py_compile scripts/build_group_configs.py
          python -m py_compile scripts/build_shard_configs.py
          python -m py_compile scripts/x_latest_post.py
          python -m py_compile scripts/feishu_command_bot.py

      - name: YAML sanity check
        run: |
          python - <<'PY'
          import yaml
          for p in [
              "config/config.yaml",
              "config/timeline.yaml",
          ]:
              with open(p, "r", encoding="utf-8") as f:
                  yaml.safe_load(f)
          print("YAML parse OK")
          PY

      - name: Dotenv example sanity check
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          env_file = Path(".env.example")
          pattern = re.compile(r"^[A-Za-z_][A-Za-z0-9_]*=.*$")

          bad_lines = []
          for idx, raw in enumerate(env_file.read_text(encoding="utf-8").splitlines(), 1):
              line = raw.strip()
              if not line or line.startswith("#"):
                  continue
              if not pattern.match(line):
                  bad_lines.append((idx, raw))

          if bad_lines:
              print("Invalid dotenv lines in .env.example:")
              for idx, raw in bad_lines:
                  print(f"  line {idx}: {raw}")
              raise SystemExit(1)

          print(".env.example format OK")
          PY

      - name: Docker Compose config check
        run: |
          cp .env.example .env
          python scripts/build_group_configs.py
          docker compose config >/dev/null

      - name: Docker Compose grouped profile check
        run: |
          cp .env.example .env
          export WEWORK_WEBHOOK_URL_AI=https://example.invalid/ai
          export WEWORK_WEBHOOK_URL_POLITICS=https://example.invalid/politics
          export WEWORK_WEBHOOK_URL_INVEST=https://example.invalid/invest
          COMPOSE_PROFILES=grouped docker compose config >/dev/null

      - name: Docker Compose sharded profile check
        run: |
          cp .env.example .env
          python scripts/build_shard_configs.py --shards 3
          COMPOSE_PROFILES=sharded docker compose config >/dev/null

      - name: Unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v
